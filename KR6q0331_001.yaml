body:
  text: 目次序袁州木平興化禪寺語録臨江瑞筠山慧力禪寺語録饒州東湖薦禪寺語録頌古偈頌佛祖讚自真讚跋法語小佛事塔銘跋海印和尚住袁州木平興化禪寺語録門人行純集師於至元十九年四月十五日在仰山首座寮受請入寺指法座云三世諸佛行不到處天下老和尚說不到處今日新木平一時舉似諸人去也驟步便登祝聖罷復拈香云奉為我見住大仰山宣授慧朗大禪師雪巖和尚用酬法乳之恩乃斂衣就座僧問三世諸佛行不到天下老和尚說不到好人天法座前請師一句分明道祝聖海衆咸臻學人上來請師德山河壯帝居進云祝聖已蒙師指示向上宗乘事若何師云此遠進云恁麼則言言見諦句句朝宗去也師云也是尋常用底進云此事且止只如昔日大禪佛到仰山繞繩床三匝振錫一下翹足而立云西天四七也與麼唐土二三也與麼天下老和尚也與麼和尚也與麼某甲也與麼仰山打四藤條意旨如何師云分開泰華裂破黃河進云大禪佛後至霍山云集雲峰下四藤條天下大禪佛參霍山喚維那打鐘著大禪佛便走又作麼生師云賊是小人智過君子進云後來雪竇道藤條未到折因甚麼只打四下又且如何師云左半斤右八兩僧云只如和尚親見仰山且道與大禪佛相去多少師云山僧是新淦人氏僧云與麼則今古應無異分明在目前師云大遠在僧禮拜師乃云我此法印為欲利益世間故說謹護祕藏勿妄宣布今日豁開錦縫文彩全彰不問情與無情一印印定直得石頭佛回避無門鉢盂峯包褁不及正與麼時還當得出世邊事也無良久猶握金鞭問歸客夜深誰共御街行舉開山道禪師初參洛浦和尚問一漚未發時如何辨其水脉浦云移舟諳水勢舉棹別波瀾道不契後參蟠龍文禪師復理前問文云移舟不別水舉棹即迷源道當下大悟師拈云二大老雖具辨龍蛇擒虎兕眼目未免和泥合水道禪師與麼悟去也是泥裡洗土塊新木平與麼點撿還有出古人見處也無大海若知足百川應倒流上堂一漚未發地闊天寬山雲冉冉㵎水潺潺向者裡見木平即易見真寂即難何也江南地暖塞北天寒留兩序上堂不舊不新不進不退天以之而覆地以之而載雖然堯舜之君猶有化在上堂僧問記得昔日僧問開山和尚如何是木平答云不勞斤斧意旨如何師云妙手畫難成進云其僧又問如何是不勞斤斧答云木平又作麼生師云猶有圭角在僧禮拜師乃云破有法王出現世間驀拈主丈主丈是有卓一下即今破也還見法王出現麼靠主丈疑殺天下人上堂謝廣南海藏主鎮海明珠光生宇宙馬祖玩月南泉拂袖只如經歸藏禪歸海又作麼生一條官驛路今古有人行臘八上堂六載雪山穿衣露肘午夜明星指槐作柳便道如來智慧德相大地衆生具有也是自揚家醜宜乎雲門一棒剛要打殺與狗啞負恩者多知恩者少出城歸上堂惟此一事實餘二則非真空山白雲閙市紅塵天高無極地無垠鎮州蘿蔔重三斤上堂二月過三月來千紅萬紫雨洗風摧瞥見空山晴晝緑楊影裡一樹白桃開風前凝佇小徘徊呵呵呵無人知此意獨上高高臺上堂如來禪祖師意雞寒上樹鴨寒下水恁麼也是不恁麼也是恁麼也不是不恁麼也不是諸人向者裡瞥地方知道拈却鼻孔將甚麼噴嚏上堂禪非坐臥亦離功勳道無取捨全超見聞說甚柏樹子乾屎橛麻三斤三世如來一口吞真箇那只聞其語不見其人祈雨上堂炎炎六月雨竟未通拈主丈卓一下鞭起碧潭龍三日為霖兮時和歲豐咄七月初一日上堂動絃別曲以拂子擊一下還聞麼葉落知秋以拂子拂一拂還見麼縱使離聞離見不見不聞猶隔青山幾點雲解制上堂鵝雪通身白臘人全體氷頽然無伎倆直下絶功勛索索西風倚瘦藤靜看山南山北起寒雲上堂見聞之內動靜之中取之不竭用之無窮日午炎炎畏日夜深颯颯凉風竹籬頭壁角落漸聽啾啾唧唧鳴秋蟲上堂舉白雲端和尚初參楊岐會和尚會問云聞汝師有悟道頌試舉看白雲便舉云我有神珠一顆久被塵勞關鎖今朝塵淨光生照見山河萬朵會乃大笑白雲懷疑通夕不𥧌次日入室啓問時方歲暮會云汝見昨日打夜狐底麼云見會云汝一籌不及他他愛人笑汝怕人笑白雲言下大悟師拈云郁山主拾得一顆豌豆喚作明珠引得白雲懷為至寶不消楊岐輕輕點破分文不直前面未免疑殺天下人後面笑殺天下人點撿將來直是好笑何也握土為金猶可易變金為土却還難上堂舉阿難問迦葉世尊傳金襴外別傳箇什麼恁麼問即易相續也大難迦葉召阿難阿難應諾迦葉云倒却門前剎竿著大小迦葉師兄被阿難一問直得分踈不下後來汾陽和尚道不問那知且莫詐明頭五祖戒和尚云露錯翠巖芝和尚云千年無影樹今時沒底靴看孔著楔有甚用處泐潭清和尚云剎竿未倒穿却汝諸人鼻孔換却汝諸人眼睛剎竿倒後甚麼處見釋迦老子劄性空觀和尚云是什麼說話如今要問諸方倒却門前剎竿著還當得教外別傳旨趣也無懸羊頭賣狗肉諸大老雖則提持向上巴鼻未免隨語生解木平別無長處也要與古人活一隻眼驀拈主丈卓一卓疑殺天下人臨江瑞筠山慧力禪寺海印和尚語録門人道彰集天壽聖節上堂僧問記得太宗皇帝問僧近離甚處僧云臥雲太宗云臥雲深處不朝天因甚到這裡僧無語此意如何師云乾坤收不得宇宙不知名進云後來雪竇代云難逃至化又作麼生師云金屑雖貴落眼成翳進云只如今日天壽聖節未審和尚將何祝贊師云合國咸知進云龍得水時添意氣虎逢山色長威獰師云高高處觀之不足僧禮拜師乃云天得一以清地得一以寧君王得一而天下大治且道一從何起卓主丈大哉乾元萬物資始上堂有句無句如藤倚樹樹倒藤枯因甚三千里外賣却布單遠來放下泥盤呵呵大笑毗婆尸佛早留心直至如今不得妙浴佛上堂未離兜率已降王宮未出母胎度人已畢釋迦老人還有出沒處也無惡聲惡跡洗難清雲門有令不虗行下座詣佛殿普請大禮三拜與他一時蓋覆却結制小參護生須是殺殺盡始安居鬼窟裡活計會得箇中意鐵船水上浮也是強說道理瑞筠門下一任龍蛇混雜凡聖交參不揀甚麼昆蟲草木有情無情同入清淨覺海游泳平等性智喫飯底喫飯瞌睡底瞌睡卓主丈清平世界無間地次日上堂瑞筠一關似乎等間說時則易透却還難青蘿夤緣直上寒松之頂白雲淡濘出沒大虗之間我今為汝保任此事終不虗也忽有箇漢不守聖制不住伽藍却如何指示卓主丈喝一喝上堂進一步銀山萬仞退一步鐵壁千尋正與麼時諸人若知有轉身句便見澄澄江月廓爾全彰浩浩松風熾然常說良久大小瑞筠話作兩橛上堂結夏過半月那事如何說寒山子水牯牛蠟人氷鵝護雪總是鑽空覔穴諸方難見易識瑞筠易見難識直饒萬緣休罷一字不留擬議不來青天霹靂上堂問著不知拶著不會至理玄關泥團土塊知不知會不會白雲盡處是青山行人更在青山外上堂舉盧祖得法後未剃落寓廣州法性寺時風揚剎幡一僧曰風動一僧曰幡動諍論不已祖曰還許俗流忝預高論否僧云可爾祖曰不是風動不是幡動仁者心動二僧息諍今日不肖兒孫點撿將來盧祖雖能息二僧諍要且不能使二僧活若是瑞筠則不然拈主丈示衆云亦不是風動亦不是幡動亦不是心動擲下主丈是什麼散青苗經會上堂依經解義三世佛怨離經一字即同魔說只如溈山和尚問仰山云涅槃經中多少是佛說多少是魔說仰山云總是魔說到此如何甄別銀碗裡盛雪無智人前莫說打伊頭破腦裂示衆身要端坐要直十二時要純一提箇無猛著力如一人與萬敵忘情謂絶氣息冷湫湫空寂寂三大劫只一念四大海只一滴昏與散無蹤跡佛與祖休尋覔動與靜定乾坤照與用轟霹𮦷能與麼參學畢元來自己便是生鐵壁鐵壁鐵壁上堂流汗不徹揮扇不徹驀然打著箇豹腳花蚊直得通身順快歡喜不徹所以道殺盡始安居諸人瞥不瞥啞子得夢向誰說木人笑得口脣裂便與麼會去是真作家不及詣寮陳謝下座巡堂喫茶解制小參九旬禁足魚投網衝浪錦鱗猶滯水三月安居鳥入籠摩霄俊翮尚迷雲生殺盡時蠶作繭才有所重便作窠臼如何透得這三重說甚三重百匝千重一時俱透驗蠟人氷與不氷憐鵝護雪而不雪總是家常日用邊事如今三期已滿萬行自圓諸人到此還知時別宜麼一葉落天下秋水光雲影天悠悠卓主丈負命誰來上直鈎舉東山空禪師示衆云百鍊黃金鑄鐵牛十分高價與人酬庭前不有花含笑又是東山一夏休師拈云空禪師與麼道大似東頭買賤西頭賣貴多處要添少處要減未免價數不登商量不圓瑞筠一夏隨分攤出寒山子水牯牛蠟人氷鐵彈子同諸人開鉢共飯不作賤不作貴東行不見西行利有利無利不離行市瑞筠便是掗與人也沒要底啞見之不取思之千里次日上堂解開布袋口南北路頭通十方無壁落三界絶行蹤西者西兮東者東雲水自重重上堂信腳行信口道用處不須生作造驀然踏著伏馬橋不覺撞得破竈墮才與麼不與麼却憶歸宗曾有言頭陀石被莓苔褁以拂子擊繩床下座上堂猿抱子歸青嶂後鳥銜花落碧巖前二十年只作境會錦遮機穽又云既不作境會畢竟作什麼會鐵褁泥團華梵不可譯呼應有來端瑞筠門下毫髮難謾何故闌干雖共倚山色不同觀上堂僧問昔日僧問投子大死底人却活時如何投子云不許夜行投明須到意旨如何師云南天台北五臺進云學人不會師云晝打三千暮打八百僧禮拜師乃云言跡之興異途之所由生言未興跡未形無內無外無彼無此無遠無近無一絲頭不現成及乎即內即外即彼即此即遠即近繁興妙轉不留情正與麼時如何通信乾坤收不得今古不知名上堂似有似無半真半假疑殺天下人不在之乎者十二時中須知自己落處若也知粗虀淡飯且與麼過若也不知白日青天切忌瞌睡上堂莫行心處路莫掛本來衣何須便恁麼切忌未生時莫行心處路擬心即差動念即隔只如不擬心不動念還有心處路麼言語道斷心行處滅即是不行心處路既不行心處路便是掛本來衣便是墮落在解脫深坑可畏之處古人謂之墨汁謂之黑山又謂之貼肉汗衫學道之士十箇五雙到這裡脫不下直饒暫時脫下觸目遇緣便恁麼去只似順水推舟不諳水脉隨波逐浪不覺不知流入毒海所以道何須便恁麼切忌未生時未生時也無佛也無衆生也無人也無我也無彼也無此只麼渾然好箇真淨妙明廣大圓攝境界又不可坐那裡謂之座在解脫勝妙境界到者裡須知有轉身一路始得且如何是轉身一路良久任從滄海變終不為君通上堂山前一片間田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風老東山和尚與麼投機落草不少諸人還點檢得出麼山前一片間田地不立一塵空界至叉手叮嚀問祖翁了無南北與西東幾度賣來還自買不知却有何憑據為憐松竹引清風祖禰不了殃及兒孫黃梅老人早是引蔓牽枝瑞筠不肖向枝蔓上添芒索每日與諸人從朝至暮從夜至旦見諸人不昏不散便把這索子一掣教你不坐在淨地上抱不哭孩兒諸人即昏即散便把這索子一掣教你不得和泥合水指鹿為馬諸人若總不與麼到這裡須要認得祖翁面目是同是別一回親見面千載永難忘復云無一法從外而入無一法從內而出無一法和合而生無一法自然而成亦不見有生相亦不見有住相亦不見有異相亦不見有滅相於此覺得轉得猶是以楔出楔不以楔出楔時如何兩頭俱坐斷一劒倚天寒上堂雲悠悠水悠悠挑囊負鉢今日明朝撞著荒村破院白滴滴清寥