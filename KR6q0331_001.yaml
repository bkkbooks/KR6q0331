大意充塞太虗信口道著信腳踏著只是不許承當恁麼也得不恁麼也得只是不容擬議才與麼不與麼頭頭具生殺之機是亦剗非亦剗著著有出身之路不言而信不令而行純真一如無壞無雜只如高超物表不墮見知正與麼時如何發明此事以拂子掛繩床復云應庵和尚舉雲門道盡乾坤大地無纖毫過患猶是轉句不見一色只是半提更須知有全提時節應庵老人云大小雲門聽事不真喚鐘作甕薦福今日亦資一路要與古人相見莫將傳說為傳說休把曾參作魯參朝廷看藏經滿散上堂三轉法輪於大千其輪本來常清淨天人得道堅拂子此為證三寶於是現世間過去現在未來一切諸佛三十二大人相八十種隨形好十力四無所畏大慈大悲大喜大捨佛十八不共法若不以此為證即不能成就地前地上一切菩薩超三祗歷五位斷二障明一心自利利他進修勝行若不以此為證即不能成就一切聲聞一切緣覺觀十二緣空悟四諦真理具八解脫得六神通若不以此為證即不能成就西天此土從上佛祖古往今來一切知識種種建立種種施為以至俱胝竪指祕魔擎叉臨濟三玄洞山五位巴陵銀碗裡盛雪雲門北斗裡藏身隱顯縱橫千差萬別若不以此為證即不能成就教中道一切諸佛及諸佛無上菩提之法皆從此經出但是世間出世間一切佛法無有不從此經出者佛法且置畢竟如何是此經莫是以兩手舒空作展經勢麼莫是叉手進前退身三步是麼又莫是最初如是我聞末後信受奉行是麼莫是不著他語言文字是麼又莫是但向料掉沒交涉處道一句便得麼若作如是見解大似隔靴抓癢既不作如是見解畢竟作麼生擊拂須是恁麼明得苟能恁麼明得於朝夕日用之間無一處而不見佛無一處而不聞法所以道在在處處即為有佛一切法皆是佛法若恁麼見得一任三門頭合掌佛殿裡燒香經案上橫拈倒把左卷右舒放去收來朝讀暮誦直得竪窮三際橫亘十方周法界之群生遍剎塵之品類包羅萬有該括二儀無一法而不明無一法而不顯可謂法門重疊若雲起於長空行解紛披似花敷於錦上言言見諦句句超宗其舒也窮微極妙而不違及其卷也經頭只有箇以字不成八字不是且道是什麼字假使智如鶖子辨若滿慈到這裡也須目瞪口呿所以僧問睦州經頭有箇以字不成八字不是未審是箇甚麼字睦州彈指一聲云會麼僧云不會睦州云上來講讚無限良因且道當時睦州是與這僧說這箇字是不說這箇字因甚睦州便問這僧會麼諸人若向這裡會得不惟可以上報當今聖主大恩亦可表顯自己看經眼目正與麼時還會得麼聖心廣大包寰宇佛法流通亘古今復云教中云有大經卷量等三千大千世界書寫三千大千世界中事只在微塵中誰能破此微塵出此大經卓主丈即今一微塵已破諸人還見此大經卷麼喝一喝冬節小參群陰剝子啐母一陽生殼綻眼明功用綿密持養老成忘其物忘其情空而妙虗而靈正恁麼何似生回機轉位異類中行幾度黑風翻大浪未曾聞道釣舟傾上堂至德如流上善若水一塵入正受諸塵三昧起洗面摸著鼻喫茶濕却觜忽有箇出來問久嚮薦福元來只說古人舊話只向他道熟處難忘上堂八尺釘丈二楔著在眼中撼搖不得薦福門下妙在轉處誰是知音不見三祖大師道才有是非紛然失心乃擲下主丈頌古僧問雲門樹凋葉落時如何門云體露金風秋風葉落動凉颸堪笑雲門跛阿師銷盡浮華到真實不知開口落今時僧問香林如何是衲衣下事林云臘月火燒山香林臘月火燒山黑齒波師帶白環唐梵一時俱譯了肯將名字落人間僧問趙州云未有世間早有此性世界懷時此性不壞如何是不壞底性州云四大五蘊僧云此猶是壞底如何是不壞底州云四大五蘊老諗年尊閲事多清平世界樂無何一身儱侗無邊表地覆天翻也只那雲門示衆云十五日以前不問汝十五日以後道將一句來代云日日是好日日日是好日時時是好時鯨吞海水盡露出珊瑚枝僧問古德冬至後日長多少德云長一絲佛法長多少德云一線長佛法一線長青天謾度量絲頭才咬斷紅日上扶桑泐潭常禪師一日面壁而坐南泉來見撫師背一下潭云誰泉云某甲潭云如何泉云也尋常潭云汝何多事言中有響語藏鋒一色明邊分異同月棹各撑俱到岸不知身在草窠中谷隱性空和尚因僧問靈山一會何異今日性空云不異今日僧云不異底事作麼生性空云如來密語迦葉不傳酬應相於理不乖泯然一種似平懷及乎話到聱訛處樹上心肝不帶來偈頌水心一源見徹萬波翻澄不清兮撓不渾識浪境風俱列下鑄成滄海鐵崑崙靈竺鷲嶺人天鴨聽雷大仙密付絶纖埃飛來小朵從何有兩㵎琮琤一徑開雲頂溶溶泄泄復閒閒來者從教斫額看起滅無蹤空絶迹竪摩醯眼照人間震上人惡辣兒孫喪本宗向空拏撮便填空震威一喝無今古百丈馬師皆患聾刀鑷沈生空彈霜鑷到巖扄覿面難將妙手呈雨洗秋容同淡泊遠山無限佛頭青遠上人遠來一見便相違竹外清風聽者稀却是晚鴻知此意數聲清唳入雲微秀上人之仰碧巖千尺瀑雪落峭壁萬疊峰雲寒一笻雙履超聲外圓相暗機誰共看無相意地消融見亦空名模何有可形容百千明鏡俱時照一法不痕歸大同總心休攀月窟躡天根及盡玄微見本元一髮不遺千聖共湛然隨處洞無痕正堂當軒大坐照無偏爭肯顢頇數屋椽三目洞明惟直指雖然無語有人傳覺海非湛非搖見量消一漚那更目全潮不知水底蓬塵起但見珊瑚長玉苗印空萬象森羅古篆文太虗無際水無痕當陽一搭全提處直得三千海嶽昏海峰萬浪聲消一鏡新金鰲寒從玉璘珣珊瑚枝上照紅日融盡十洲三島春瑩然碧落無雲水似天清明表裡一虗玄纖塵不立充寥廓十世古今如目前曉山大明洞起爍群昏黯黯青青未易論眨得眼來遲八刻金烏已過鐵崑崙仰山中村接待水雲食息且休論東土西天也莫存此去仰山問來歷但云昨夜宿中村劒關𦦨𦦨寒霜不可干湛盧光射斗牛寒直饒過得連雲機一劄當陽透者難十牛圖尋蹤見跡得逢渠牧就騎來驀直歸物我兩忘純白後透花春入萬紅圍明維那再往踈山法身向上不須論留箇枯椿示子孫賣却布單招感得纍人頻上白雲門桂侍者耽耽雙眼視空山伏虎師曾放一斑春雨春風謝來往山中佛是石頭頑淦傅子仁號無無居士一塵不立萬緣空才有絲毫便失宗蹉口連聲提起處趙州來也不相容石門溈侍者聲撼天風虎出林石門無鑰海濤深瑞筠不閘虗空檻放去雲峰千萬尋遠上人遠來問訊近相迎物外相於不世情蒿湯備禮松陰坐山鳥自啼春晝晴送興首座歸鄉諸老門庭已遍參青出於藍青於藍表儀多士冠東南賓主歷然曾對談長篇短章玄可探杖藜所到如優曇夜月娟娟松𣯶𣯶深期瘦影同蘿龕定力已固輕毗嵐德山臨際空喃喃示芳上人萬里無寸草連天日杲杲出門便是草接地長安道庭際立無人古徑跡亦掃付與芳禪人問取虗空討蕭山孤峰持談季蕭梅軸惠訪書于后孤峰雪後歸蕭關我來瑞筠時往還能消幾屐看青山展梅一笑俱蒼顏孤山山人盟未寒逃禪禪意墨未乾季蕭左幹萬鈞重坐客駭囑推其難造化無始舒卷間先天下春非等閒歲晚相看成二老此詩此畫古今寶毗陵自然居士非因非緣非自然自然而然然不然無然非自自然自無自非然然自然自其不然常現前斯言吻合天地先萬化茫茫從此出堂堂日用乘誰力示攸州慈雲玉侍者石碌碌玉落落光彩惟渾圓塵泥自消礫匪穿鑿匪磨琢翻笑曹山露圭角學子投師空抱璞玉兮玉兮知不知老野三呼應者誰剖破方知自家底價重連城莫輕許自有聲光滿寰宇佛祖讚出山智慧德相大地誰無見星說悟謾自分疏流毒至今未已邪法難扶觀音淦州判李濟川世居饒昔有以絹素繪大士像為風水所漂後二十年漁人網得之像不壞濟川重新裝飾請贊菩薩漁師持正法網入生死海摝諸衆生達大覺岸昔於華嚴法門嘗誦其言今於濟川居士所得水中觀音畫像乃驗其事是知法力應化言像皆真必有入淨心海得不壞信者不言而喻也偈曰舒卷流通亘古今最難消是大悲心全身入水全身出奈彼衆生業海深漁籃提錦鱗露珠瓔年華如許高韻絶塵籃子尚有眼如何謾得人郁山主拾得明珠當甚驢屎溪橋橫浸洣川水政黃牛一字不穩騎牛覔牛萬疊寒山翠如流朝陽待月海天高山月小大地是卷經何時看得了放下自分曉穴鼻針無絲線一咬便斷自然成片杲日當空現達磨對梁王不契休言東土無人令二祖覔心將謂西天有佛少林月冷揚子江空至今雪浪號霜風自真讚立首座行不踏人前立不落人後老去移東湖言疏道轉踈自非筆墨可明模分付雪岑首座看是甚麼面孔唵癹叱咄攝黃鍔鈍翁請渾大璞匪雕琢聚精會神藏鋒斂鍔回入塵勞雖涉萬緣全提佛祖機先一著尋常只用鈍鉗鎚從教大地人描邈處靖庵主靖而專笑面𡎺嗔拳溫而厲觸人忘忌諱謂此是一而二謂此非伊復誰竹外遠山青似眉跋佛照和尚書帖南岡長老求跋佛照在靈徑時益公政當國王臣外護得行其道遂有孤雲秀巖空叟諸老相繼而出可想當時法社之盛偶持鉢來吉文訪南岡於龍華出此軸相示炷香展味惻然久之跋癡絶書伯夷頌夷齊高風窮天地亘萬世蘇公讚文公頌癡絶老人界方眼作小楷書相望雖邈相尚乃同道之所同理契即鄰也就中癡絶猶較些子何故我王庫內無如是刀明極西堂南游省己行請跋至大己酉良月薄寒烘日之餘隱几於梅邊竹所適有剝琢之聲啓而視之乃明極西堂也手持南游省己行一帙謂豫曰諸大老著筆已多請海印為轉一語遂受之展開次第熟閲明極所遊之地所見之境歷歷心目中看至驀忽好風動地而來乘風遍觀三千大千等微塵境入瞌睡三昧不覺鼻息如雷明極乃撼之誦了末後句於是摩挲睡眼卷而歸之曰同床各自做夢當有同覺者知之法語示明了侍者明明百草頭明明祖師意了得底未言先領未舉先知已是落第二見豈況隨語生解擬意搏量未得謂得未證謂證望他祖師門下十萬八千那裏洎在履踐穩密者心機泯絶智照活脫一明一切明一了一切了然後了無一物可得不與千聖並行堪為灑灑落落了事衲僧此事至簡至易不從人得不越一念直下證取無第二人無第二見祖云了了常知故言之不可及也到這裡須有箇轉身處始得明了侍者相從一年孜孜不倦茲欲遍參求語為途中道伴信筆示此勉之至祝示師程居士德無常師主善為師師程則知所師矣窮理盡性以至於命不涉階梯當念超越却須究竟僧問趙州狗子還有佛法也無無不是有無之無亦非真無之無便是絶理性玄妙底利刀轉性命禍福底妙法直前提起當下豁然如銀山鐵壁鐵壁銀山利衰毀譽入作無門稱譏苦樂籠不得不墮凡情不落聖解虗而靈寂而妙一切處不留一切處成就到與麼時須知有末後一句此方是大丈夫了大丈夫事謂之世間出世間上上也送學士曾巽堂本地風光生佛未具圓融無際倐為妄塵翳障便汩沒塵勞取一切境遂染煩惱當下若不能回光自照如何透出如許萬緣於違順境界不取不著語默有無動靜彼此一併截斷涉緣應機如飛劒輪如猛火聚直得纖毫絲髮不留影迹直下虗而靈寂而妙萬別千差一照照了直到大安穩處了無纖芥凝滯只麼隨處輕安究竟佛亦不存喚什麼作衆生菩提亦不立喚什麼作煩惱翛然獨脫處闤闠山林初無二種致之廊廟亦不生欣置之江湖亦不生厭總是贏得邊事何有於我哉巽堂學士生富貴中不為富貴所羅籠乃為母廬墓三載蔬茹五年閲金經明佛理至於諸子百家之書無不通究猶為未了祖師無上妙道為不足得得遠來山中飯僧請山野升堂復出此紙求一言受用隨喜不覺露醜巽其勉之答員嶠李總管迷時迷箇悟底悟時悟箇迷底迷悟兩忘譬如有人自斷其首首已斷故無能斷者見此明白直下無第二念古德道明明無悟有法即迷到者裡立亦不得住亦不得若立則危若住即瞎但出不隨應入不歸空外不尋枝內不住定要須意不停玄句不停意用不停機三者既明一切處不須管帶自然現前一切處不須照顧自然明白與麼境界時時相見不為密迢迢相迂不為疏汩汩應酬不為事礙兀兀靜坐不為理迷隨處作主遇緣即宗出沒卷舒得大自在更須知有向上一竅始得侍讀大學士員嶠真逸總管相公留意佛法咨詢師友欲得一道伴講明山中今夏雖有百餘單皆居學地未可親近大居士酬對拙謬徑直寫數字以當面言萬冀親而求之當必掀髯一笑小佛事雪巖和尚忌日拈香盡道先師今日死不知今日是生朝不知却有何憑據紫柏黃檀一處燒昔時語今日舉今昔一時絶毫絶釐大衆還見老和尚麼插香凝立云面目現在兩彩一賽周禪師忌拈香何似生遼天鶻萬重雲只一突者裡見得分明便與祖師同起同倒同放同收其或未然頭長三尺知是誰相對無言獨足立咄瑛監寺入塔用石窗燈盞瑛瑛美玉無瑕跨楊岐蹇驢凜凜寒霜無影正與麼時如何明眼人落井賢首座起骨表帥叢林山高水深賢劫前事只在如今髑髏眼活老龍吟轉身門外看紅日上危岑塔銘前集賢侍讀學士中大夫兩浙都轉運使河東李倜撰余來江右以至元丁亥理事宜春始識師于木平式相好也繼住慧力余適守臨江得顓意講道居三年往來至密大德丁未余調南劒師來餞別豫章無何師亦往住薦福音問不絶嘗以古塔主語録及師上堂普說等語見寄其惓惓可知也壬子春余由泉南漕兩浙聞師復還慧力其年六月十六日沐浴坐逝矣噫二十六年間相見相聞登臨酬酢究竟析理昌黎之於大顛蘇公之於佛印亦人情已乎明年其徒行純以狀來乞銘師楊姓昭如名海印其自號世居臨江之新淦生宋淳祐丙午十二月二十日以蓮社家兒能言即隨母鄒氏作梵唄聲七歲出家學佛居邑之建興寺香室院十九歲受咸淳制勑落髮為僧始學于沙門智寧次拜雪巖祖欽得法在集雲堂第一座至元庚辰侍雪巖入覲旨賜畦衣歸住木平十年其住慧力十九年實始至元辛卯也元貞丙申賜號普照大禪師給金襴袈裟高麗亦具衣副以金經玉𧣴西極雲南東邁遼海禪衲四來虀粥稍弗繼或丐質從事不倦槌拂而衆安之至大己酉行宣政院辟師住持薦福薦福番之巨剎唐顏宋范流風未遠賴師為重而師以疾故亦憊矣然於名聞於世行信於人視西江為益盛去年春還慧力也西江之徒實具舟焉既至猶力疾為衆說法夏初歸香室造常所來往道香積天長登仰山禮再來塔訪慈化所至逢迎道舊一夕潛理歸楫及抵瑞筠東庵則疾革矣行純又言師乳時紫胞呈祥蛟出地中其逝也久旱忽大雷雨逝之四日奉龕闍維飛煙餘燼所及舍利如粟如黍如豆齒牙如生數珠不壞今塔遺骨于故邑之青石圃中凡年六十七歲為僧四十八朞所說法語頌讚數十萬言度一姓子六十餘人嗣其法者未易槩舉師為人明敏間雅有智識度量人不見其喜慍五經一見成誦結字有古意所交遊多貴重今叢林如師不復可多得以師之行蹟其可無銘銘曰內究至理外敷貞辭千江月落溥照同時師席崇居衲子雲集饘粥稍虧或丐或質東湖三載西江跂思遠具舟楫勇退來歸載喜載馳力疾演法衣既有傳重登祖塔其生也異其死也奇舍利夥只見聞靡疑功行積真大覺氷釋聊掇緒餘文茲樂石塔銘前翰林直學士承直郎知制誥同修國史廬陵曾德裕撰西方聖人以正法眼單傳四七祖屆于東土其後派為五宗而臨濟尤盛宋之末年有居袁之仰山號雪巖師者法音雷震大亢厥宗其得法上首曰海印智證特殊開道最勝道價揭于諸方玄風暢于外域一時賢士大夫喜從之遊而於豫季巽初為稔豫投閒索居深訟昔迷方將從師講明第一義以蠲滌緣習而師既寂矣後二年慧力首座處閒以師行實介豫季求銘其塔因不復辭輒敘而銘之師名昭如楊姓世家臨江新淦父母俱事佛生時有異學語即隨母梵諷七歲從建興寺香室僧智寧出家性明敏讀誦通利一覽終不忘失年十九剃髮明年受具戒游方參雪巖示以狗子佛性話未解秋遊南嶽雨後度蕉溪足踣頓有省歸仰山精事禪宴一日巖開室師擬有言巖揮竹一擊爾大徹令歸侍司復掌藏鑰同堂皆推讓以受業師老回省留半載侍御高安陳仲微過與語奇之為賦詩重歸仰山居第二座巖開鍊尤至閲十載聖元至元庚辰隨巖應詔詣闕寓上京勝善寺巖解行幐搔癢次適僧讀華嚴經至剎等行等正覺等問師等義師對愜巖意遂作禮六月朔瞻覲例賜畦衣還山居第一座公舉住木平寺多耆宿皆悅而安之十年退休普光堂辛卯徇衆請住臨江慧力未朞為講僧來據禪衆無所安散居謀食蟻慕不忍去師力復為禪迄與俱歸自爾學者至日食數百人寺恆産不充至乞貸以給又不繼則質衣鉢責負者鴈立處之怡然平居緇素啓問無虗日師安詳謙下悲智交融貴賤等觀引接無倦或得其片言無不滿意其筆墨尤為人寶愛元貞丙申特旨賜普照大禪師加錫金襴衣大德中高麗亦遣使貽師大衣金經玉𧣴至大己酉行宣政院請居饒之薦福臨江人揮淚送之師亦自以為是有緣故居慧力至十九年之久皇慶壬子春其徒聞師嬰疾具舟迎還夏至香室往禮雪巖塔歸慧力東堂將示寂或具紙筆請語乃示云末後句無別說六月炎天飛片雪復贊王將軍真了了如平時既命具浴時久旱忽大雷雨雨止師已坐逝四衆悲號人天愁慟六月十六日也越五日奉龕闍維於瑞筠山西南薪盡火滅牙齒數珠不壞煙爓所及草木壤石間舍利無數掘地求者餘半載不竭其徒行純等奉靈骨塔于淦北青石圃中師生淳祐丙午十二月二十日壽六十有七臘四十有八語録數十萬言度一姓子六十餘嗣法者甚衆閒尤見器重至是分取舍利置塔闍維之所從西竺律儀也其所述如此質以他所聞可信不誣豫於最上乘之道知好之而未造其閫域故於師之所以得證於其師者淺深之際弗能知也所可知者師梵行精白性度慈忍為緇素所歸至於生死不怛堅固可徵非真有得者而能然耶銘曰祖來自西救迷情歷玄暨欽教大行師明其微久益明於法無我忍得成體圓智滿源澄清行嚴機峻用縱橫廓然現量包寰瀛東湖瑞筠與木平終始去住浮雲輕巖前片雪飛無聲松風六月猶哀鳴不斷相兮非常名了無滅兮本無生流珠奕奕函真精我銘塔標化城海印和尚得法於仰山慧朗禪師徑山圓照之嫡孫也其宗正其眼明其機峻其用險端自鉗鎚妙密重烹熟鍊中來不知者以語言為流布吁執指是月非狂即愚當起此老為之發藥可也此録既出豈少補哉延祐七年臘月望日鄱陽淡湖住山清茂手書佛祖之道如青天白日只貴親證親悟綿綿密密無纖毫滲漏然後垂一機示一句無非與一切人解粘去縛拔楔抽釘若也緇素不分和泥合水譬如靈龜負圖自取喪身之兆薦福海印和尚久侍雪巖先師盡得其末後句子所以三會說法縱擒自若殺活自由著著有出身之路今欲鋟梓流通為題之於後云至治辛酉五月望徑山法第比丘希陵拜手
