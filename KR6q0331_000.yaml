front:
  text: 海印禪師三會語序至大戊申夏巽申為先母丁夫人作盂蘭盆齊請慧力海印禪師舉揚次得侍師萬松間熟談纍日師大見器謂爾宿命中來從容往復嘗舉不為說破一則笑云將謂老僧別有自爾深契明年余涉北師去住江東薦福洎余還山師亦歸憩寶林屬疾遣僧持寄手書一偈末曰妙轉機先曾領略東軒一月古今明蓋師嘗讚先君武城郡伯遺像云古今天地月照東軒先君捐館日書頌有曰凌風而行秋月中天師意在三之義古今一揆感念罔極涕淚交零昔湛堂塔大慧請銘無盡居士承問眼睛不壞遂云這金剛吾師今之湛堂也若夫金剛眼久矣師語録乃其徒行純所輯將刻布伻書館遠求序引固雖莫措一辭而誼無噫第一義非言說豈智知識識及思量分別之所解哉師之道猶水循器有言此水之方者圓者曲者直者大者小者是其器自殊非水之有二也觀是録者無局其器則後五百年以海注海否則自纏葛藤猶沐漆而求解也延祐四年七月日翰林國史院編修宮曾巽申序
